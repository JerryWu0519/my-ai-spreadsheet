  <script>

  <!-- Google Tag Manager -->

        j = d.createElement(s),
        dl = l != 'dataLayer' ? '&l=' + l : '';

      j.src = 'https://www.googletagmanager.com/gtm.js?id=' + i + dl;
      f.parentNode.insertBefore(j, f);

</head>

<body>
  <!-- Google Tag Manager (noscript) -->
  <!-- prettier-ignore -->
  <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-MDFG6DX4" crossorigin="anonymous" height="0"
      width="0" style="display:none;visibility:hidden"></iframe></noscript>
  <!-- End Google Tag Manager (noscript) -->
  <noscript>You need to enable JavaScript to run this app.</noscript>
  <!-- These styles are carried over to the <QuadraticLoading> component
         which additionally adds the effects for light/dark mode -->
  <style>
    body {
      margin: 0;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }

    /* Banksheet loading screen — minimal, calm */
    [data-loading-start] body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #f8f9fb;
    }

    [data-loading-start] body:before {
      content: '';
      display: block;
      width: 40px;
      height: 40px;
      border: 2.5px solid #e2e6ed;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: bk-spin 0.7s linear infinite;
    }

    [data-loading-start] body:after {
      content: 'Banksheet';
      display: block;
      position: absolute;
      top: calc(50% + 40px);
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Inter', system-ui, sans-serif;
      font-weight: 600;
      font-size: 14px;
      letter-spacing: -0.01em;
      color: #6b7280;
      opacity: 1;
      transition: opacity 0.4s ease-in-out 0.3s;
    }

    @starting-style {
      [data-loading-start] body:after {
        opacity: 0;
      }
    }

    @keyframes bk-spin {
      to { transform: rotate(360deg); }
    }
  </style>
  <div id="root"></div>
  <script type="module" src="/src/index.tsx"></script>
  <!--
    The combination of these two things (<script> & <style>) appear to be
    what makes possible the expected effect of panning and zooming (especially
    with pinch to zoom on a trackpad) on the grid without experiencing weird
    zoom or inertial panning effects.

    Prevent window zooming on Chrome
    https://stackoverflow.com/questions/61114830/how-to-prevent-native-browser-default-pinch-to-zoom-behavior

    Disable inertial scroll
    https://stackoverflow.com/questions/28103125/disable-inertia-scroll-for-single-page-webapp

    Disable two finger scroll to go back (overscroll-behavior-x: contain;)
    https://stackoverflow.com/questions/15829172/stop-chrome-back-forward-two-finger-swipe
  -->
  <script>
    window.addEventListener(
      'wheel',
      (e) => {
        if (e.ctrlKey) {
          e.preventDefault();
          return;
        }
      },
      { passive: false }
    );
  </script>
  <style>
    html,
    body,
    #root,
    .App {
      height: 100%;
      overscroll-behavior-x: contain;
    }

    body {
      overflow: hidden;
    }

    /* Disable two finger swipe back
       https://stackoverflow.com/questions/15829172/stop-chrome-back-forward-two-finger-swipe */
    html {
      overscroll-behavior-x: none;
    }

    body {
      overscroll-behavior-x: none;
    }
  </style>
</body>

</html>
